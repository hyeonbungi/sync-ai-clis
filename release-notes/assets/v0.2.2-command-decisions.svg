<svg viewBox="0 0 600 292" width="600" height="292" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="sync-ai-clis dry-run showing confirmed native update commands for Codex and Kiro">
  <style>
    .t { font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; font-size: 13px; fill: #e6edf3; white-space: pre; }
    .ti { font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; font-size: 12px; fill: #8b949e; }
    .h { font-weight: 600; }
    .d { fill: #8b949e; }
    .g { fill: #3fb950; }
    .p { fill: #7ee787; }
  </style>
  <rect x="0.5" y="0.5" width="599" height="291" rx="10" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="599" height="36" rx="10" fill="#161b22"/>
  <rect x="0.5" y="20" width="599" height="16.5" fill="#161b22"/>
  <line x1="0.5" y1="36.5" x2="599.5" y2="36.5" stroke="#30363d"/>
  <circle cx="22" cy="18.5" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="18.5" r="6" fill="#febc2e"/>
  <circle cx="62" cy="18.5" r="6" fill="#28c840"/>
  <text x="300" y="23" text-anchor="middle" class="ti">sync-ai-clis</text>

  <text x="22" y="66" class="t" xml:space="preserve"><tspan class="p">$</tspan> sync-ai-clis --dry-run --only codex,kiro</text>

  <text x="22" y="104" class="t h" xml:space="preserve">==&gt; Codex CLI</text>
  <text x="22" y="124" class="t" xml:space="preserve">   Codex CLI  0.139.0 -&gt; (dry-run)  <tspan class="g">OK</tspan></text>
  <text x="22" y="144" class="t d" xml:space="preserve">   would run: codex update</text>

  <text x="22" y="184" class="t h" xml:space="preserve">==&gt; Kiro CLI</text>
  <text x="22" y="204" class="t" xml:space="preserve">   Kiro CLI   2.6.1   -&gt; (dry-run)  <tspan class="g">OK</tspan></text>
  <text x="22" y="224" class="t d" xml:space="preserve">   would run: kiro-cli update --non-interactive</text>

  <text x="22" y="264" class="t h" xml:space="preserve">==&gt; Summary</text>
  <text x="22" y="284" class="t" xml:space="preserve">  2 tools checked, 2 dry-run update plans ready</text>

  <rect x="0.5" y="0.5" width="599" height="291" rx="10" fill="none" stroke="#30363d"/>
</svg>
