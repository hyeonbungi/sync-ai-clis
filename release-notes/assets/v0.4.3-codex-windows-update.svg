<svg viewBox="0 0 660 380" width="660" height="380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="sync-ai-clis dry-run showing Windows native Codex update using the guarded official installer">
  <style>
    .t { font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; font-size: 13px; fill: #e6edf3; white-space: pre; }
    .ti { font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; font-size: 12px; fill: #8b949e; }
    .d { fill: #8b949e; }
    .g { fill: #3fb950; }
    .y { fill: #d29922; }
    .p { fill: #7ee787; }
    .r { fill: #f85149; }
  </style>
  <rect x="0.5" y="0.5" width="659" height="379" rx="10" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="659" height="36" rx="10" fill="#161b22"/>
  <rect x="0.5" y="20" width="659" height="16.5" fill="#161b22"/>
  <line x1="0.5" y1="36.5" x2="659.5" y2="36.5" stroke="#30363d"/>
  <circle cx="22" cy="18.5" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="18.5" r="6" fill="#febc2e"/>
  <circle cx="62" cy="18.5" r="6" fill="#28c840"/>
  <text x="330" y="23" text-anchor="middle" class="ti">sync-ai-clis 0.4.3</text>

  <text x="22" y="66" class="t" xml:space="preserve"><tspan class="p">PS&gt;</tspan> sync-ai-clis --dry-run --no-install --only codex</text>

  <text x="22" y="100" class="t" xml:space="preserve">==&gt; Codex CLI</text>
  <text x="22" y="124" class="t" xml:space="preserve">   Current version: 0.142.5</text>
  <text x="22" y="148" class="t" xml:space="preserve">   Codex CLI  0.142.5 -&gt; (dry-run)  <tspan class="g">OK</tspan></text>
  <text x="22" y="178" class="t" xml:space="preserve">   would run: powershell -NoProfile -ExecutionPolicy Bypass -Command</text>
  <text x="42" y="202" class="t d" xml:space="preserve">"if (-not (Get-Command Get-FileHash ...)) {</text>
  <text x="42" y="226" class="t y" xml:space="preserve">   function Get-FileHash { SHA256 fallback, Path + LiteralPath }</text>
  <text x="42" y="250" class="t d" xml:space="preserve"> }; $env:CODEX_NON_INTERACTIVE=1;</text>
  <text x="42" y="274" class="t d" xml:space="preserve">    irm https://chatgpt.com/codex/install.ps1 | iex"</text>

  <text x="22" y="314" class="t" xml:space="preserve"><tspan class="r">before:</tspan> codex update launched unguarded powershell.exe</text>
  <text x="22" y="340" class="t" xml:space="preserve"><tspan class="g">now:</tspan> same official installer, guarded by sync-ai-clis</text>

  <rect x="0.5" y="0.5" width="659" height="379" rx="10" fill="none" stroke="#30363d"/>
</svg>
