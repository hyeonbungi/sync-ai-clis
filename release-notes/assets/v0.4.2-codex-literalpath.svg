<svg viewBox="0 0 640 360" width="640" height="360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="sync-ai-clis dry-run showing the Codex Windows installer using Get-FileHash LiteralPath with the local fallback">
  <style>
    .t { font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; font-size: 13px; fill: #e6edf3; white-space: pre; }
    .ti { font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; font-size: 12px; fill: #8b949e; }
    .d { fill: #8b949e; }
    .g { fill: #3fb950; }
    .y { fill: #d29922; }
    .p { fill: #7ee787; }
    .r { fill: #f85149; }
  </style>
  <rect x="0.5" y="0.5" width="639" height="359" rx="10" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="639" height="36" rx="10" fill="#161b22"/>
  <rect x="0.5" y="20" width="639" height="16.5" fill="#161b22"/>
  <line x1="0.5" y1="36.5" x2="639.5" y2="36.5" stroke="#30363d"/>
  <circle cx="22" cy="18.5" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="18.5" r="6" fill="#febc2e"/>
  <circle cx="62" cy="18.5" r="6" fill="#28c840"/>
  <text x="320" y="23" text-anchor="middle" class="ti">sync-ai-clis 0.4.2</text>

  <text x="22" y="66" class="t" xml:space="preserve"><tspan class="p">PS&gt;</tspan> sync-ai-clis --dry-run --yes --only codex</text>

  <text x="22" y="100" class="t" xml:space="preserve">==&gt; Codex CLI</text>
  <text x="22" y="124" class="t" xml:space="preserve">   Codex CLI  (none) -&gt; (dry-run)  <tspan class="g">OK</tspan></text>
  <text x="22" y="150" class="t" xml:space="preserve">   would run: powershell -NoProfile -ExecutionPolicy Bypass -Command</text>
  <text x="42" y="174" class="t d" xml:space="preserve">"if (-not (Get-Command Get-FileHash ...)) {</text>
  <text x="42" y="198" class="t y" xml:space="preserve">   param([Alias('LiteralPath')][string]$Path, ...)</text>
  <text x="42" y="222" class="t d" xml:space="preserve"> }; irm https://chatgpt.com/codex/install.ps1 | iex"</text>

  <text x="22" y="264" class="t" xml:space="preserve"><tspan class="r">0.4.1:</tspan> fallback rejected Get-FileHash -LiteralPath</text>
  <text x="22" y="292" class="t" xml:space="preserve"><tspan class="g">0.4.2:</tspan> fallback accepts both -Path and -LiteralPath</text>
  <text x="22" y="324" class="t d" xml:space="preserve">Official Codex installer URL remains hardcoded and unchanged.</text>

  <rect x="0.5" y="0.5" width="639" height="359" rx="10" fill="none" stroke="#30363d"/>
</svg>
