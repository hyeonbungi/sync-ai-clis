# One-time bootstrap: microsoft/winget-pkgs requires a brand-new package's
# first version to arrive as a new-package PR (WinGet Releaser only updates
# existing packages). komac/wingetcreate `new` are interactive beyond their
# flags, so the manifests are hand-maintained under .github/winget/<version>/
# and submitted non-interactively with `wingetcreate submit`.
# Manual dispatch only — needed once per brand-new package identifier.
name: WinGet Bootstrap (first version)

on:
  workflow_dispatch:
    inputs:
      manifest-dir:
        description: "Path to the version manifest directory"
        default: ".github/winget/0.1.0"
        type: string

permissions:
  contents: read

jobs:
  submit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download wingetcreate (official standalone)
        shell: pwsh
        run: Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
      - name: Submit new-package PR to winget-pkgs
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
          MANIFEST_DIR: ${{ inputs.manifest-dir }}
        run: |
          .\wingetcreate.exe submit --prtitle "New package: hyeonbungi.sync-ai-clis version 0.1.0" --token $env:WINGET_TOKEN $env:MANIFEST_DIR
